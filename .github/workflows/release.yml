name: Release Build

on:
  push:
    tags:
      - 'v*'
      - 'v.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Android SDK
        run: |
          PREINSTALLED_ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          ANDROID_SDK_ROOT="${RUNNER_TEMP}/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          # Use pre-installed sdkmanager; setup-android@v3 downloads v16.0 (needs JDK 17)
          SDKMANAGER="${PREINSTALLED_ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SDKMANAGER" ]; then
            mkdir -p "${ANDROID_SDK_ROOT}/licenses"
            cp -r "${PREINSTALLED_ANDROID_SDK_ROOT}/licenses/." "${ANDROID_SDK_ROOT}/licenses/" || true
            yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-10" "build-tools;28.0.3"
          else
            echo "sdkmanager not found at $SDKMANAGER, checking alternatives..."
            find "${PREINSTALLED_ANDROID_SDK_ROOT}" -name sdkmanager -type f 2>/dev/null
          fi
          ls -la "${ANDROID_SDK_ROOT}/platforms/" || true
          # Old AGP expects annotations.jar in the deprecated tools/support path
          mkdir -p "${ANDROID_SDK_ROOT}/tools/support"
          touch "${ANDROID_SDK_ROOT}/tools/support/annotations.jar"

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/release.keystore"
          echo "KEYSTORE_PATH=${{ runner.temp }}/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeLapse-Release
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
